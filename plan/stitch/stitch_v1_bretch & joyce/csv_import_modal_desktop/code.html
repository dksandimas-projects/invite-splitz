<button class="p-2 hover:bg-butter rounded-full transition-colors active:scale-90">
<span class="material-symbols-outlined text-warm-grey">close</span>
</button>
</div>
<!-- Body -->
<div class="space-y-6">
<p class="text-body-sm text-warm-grey">
                    Upload a CSV file to bulk-add guests. Existing guests will not be overwritten.
                </p>
<!-- Expected Columns -->
<div class="space-y-2">
<span class="text-label-caps text-xs text-warm-grey uppercase tracking-wider">Expected Format:</span>

                        firstName | lastName | pax | role
                    </div>
</div>
<!-- Drop Zone -->
<div class="relative group cursor-pointer border-2 border-dashed border-stone rounded-xl p-10 flex flex-col items-center justify-center space-y-4 hover:border-sage hover:bg-surface-container-low transition-all duration-200" id="drop-zone">
<div class="w-16 h-16 rounded-full bg-surface flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-warm-grey text-4xl" data-icon="upload">upload</span>
</div>
<div class="text-center">
<p class="font-medium text-on-surface">Drop your CSV here</p>
<p class="text-body-sm text-warm-grey">or click to browse from your computer</p>
</div>
<input accept=".csv" class="absolute inset-0 opacity-0 cursor-pointer" id="file-input" type="file"/>
</div>
<!-- Template Download Link -->
<div class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sage text-lg" data-icon="download">download</span>

</div>
</div>

<button class="px-6 py-2.5 rounded-full border border-stone text-on-surface font-medium text-sm hover:bg-surface transition-all active:scale-95">
                    Cancel
                </button>
<button class="px-8 py-2.5 rounded-full bg-primary-container text-on-primary-container font-medium text-sm hover:shadow-md transition-all active:scale-95 flex items-center gap-2">
                    Upload
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>

<!-- Micro-interaction Script -->
<script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-sage', 'bg-surface-container-low');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-sage', 'bg-surface-container-low');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-sage', 'bg-surface-container-low');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileUpload(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files[0]);
            }
        });

        function handleFileUpload(file) {
            if (file.name.endsWith('.csv')) {
                const textContainer = dropZone.querySelector('.text-center p:first-child');
                textContainer.innerText = `Selected: ${file.name}`;
                textContainer.classList.add('text-secondary');
            } else {
                alert('Please upload a valid CSV file.');
            }
        }
    </script>
