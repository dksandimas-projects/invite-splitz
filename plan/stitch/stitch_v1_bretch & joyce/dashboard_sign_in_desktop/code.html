<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In | Bretch & Joyce Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1a1c19",
                        "on-background": "#1a1c19",
                        "forest": "#4E8A20",
                        "tertiary": "#605e5a",
                        "on-primary-container": "#625400",
                        "surface-container-low": "#f4f4ef",
                        "secondary-fixed-dim": "#9fd762",
                        "on-secondary-fixed-variant": "#2d5000",
                        "on-secondary-container": "#427000",
                        "on-error": "#ffffff",
                        "background": "#fafaf5",
                        "primary-fixed-dim": "#e5c500",
                        "warm-grey": "#7A7670",
                        "on-primary-fixed": "#211b00",
                        "tertiary-container": "#ccc9c4",
                        "surface-tint": "#6e5e00",
                        "on-tertiary-container": "#565451",
                        "surface-container-high": "#e8e8e4",
                        "inverse-surface": "#2f312e",
                        "tertiary-fixed": "#e6e2dd",
                        "surface-variant": "#e2e3de",
                        "surface-container-highest": "#e2e3de",
                        "on-tertiary-fixed-variant": "#484743",
                        "on-primary-fixed-variant": "#534600",
                        "secondary-fixed": "#baf47a",
                        "on-surface-variant": "#4c4732",
                        "inverse-primary": "#e5c500",
                        "sage": "#B5CC6E",
                        "butter": "#F5F2C0",
                        "inverse-on-surface": "#f1f1ec",
                        "surface-container": "#eeeee9",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "surface-dim": "#dadad6",
                        "on-tertiary-fixed": "#1c1c19",
                        "on-secondary": "#ffffff",
                        "lemon": "#F0E44A",
                        "on-tertiary": "#ffffff",
                        "stone": "#E2DED8",
                        "tertiary-fixed-dim": "#c9c6c1",
                        "outline": "#7e7760",
                        "primary-fixed": "#ffe257",
                        "surface": "#fafaf5",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fafaf5",
                        "primary-container": "#e8c800",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#0f2000",
                        "outline-variant": "#cfc6ac",
                        "secondary-container": "#baf47a",
                        "secondary": "#3d6a00",
                        "primary": "#6e5e00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max-dashboard": "1024px",
                        "section-gap-mobile": "3rem",
                        "container-max-guest": "576px",
                        "gutter": "1.5rem",
                        "section-gap-desktop": "5rem"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "body-lg": ["Inter"],
                        "section-heading": ["Cormorant Garamond"],
                        "hero-names-mobile": ["Cormorant Garamond"],
                        "body-main": ["Inter"],
                        "body-sm": ["Inter"],
                        "hero-names": ["Cormorant Garamond"]
                    },
                    "fontSize": {
                        "label-caps": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.15em", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "300"}],
                        "section-heading": ["30px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "hero-names-mobile": ["48px", {"lineHeight": "1.1", "fontWeight": "300"}],
                        "body-main": ["16px", {"lineHeight": "1.6", "fontWeight": "300"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "hero-names": ["72px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "300"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fafaf5;
            -webkit-font-smoothing: antialiased;
        }
        .auth-card-shadow {
            box-shadow: 0px 4px 20px rgba(44, 43, 40, 0.05);
        }
        /* Simple micro-interaction for buttons */
        .btn-active:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        input:focus {
            outline: none;
            border-color: #6e5e00 !important;
            box-shadow: 0 0 0 1px #6e5e00;
        }
    </style>
</head>
<body class="font-body-main text-on-surface flex flex-col min-h-screen">
<!-- Auth Background Ambient Decor -->
<div class="fixed inset-0 pointer-events-none overflow-hidden hidden md:block">
<div class="absolute -top-12 -left-12 opacity-10">
<svg class="text-forest fill-current" height="400" viewbox="0 0 100 100" width="400">
<path d="M50,10 C40,25 20,30 10,50 C20,70 40,75 50,90 C60,75 80,70 90,50 C80,30 60,25 50,10 Z" fill-opacity="0.2"></path>
<path d="M50,20 C45,30 35,32 30,40 C35,48 45,50 50,60 C55,50 65,48 70,40 C65,32 55,30 50,20 Z" fill-opacity="0.4"></path>
</svg>
</div>
<div class="absolute -bottom-12 -right-12 opacity-10 rotate-180">
<svg class="text-forest fill-current" height="400" viewbox="0 0 100 100" width="400">
<path d="M50,10 C40,25 20,30 10,50 C20,70 40,75 50,90 C60,75 80,70 90,50 C80,30 60,25 50,10 Z" fill-opacity="0.2"></path>
</svg>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-gutter py-section-gap-desktop relative z-10">
<!-- Centered Sign-In Card -->
<div class="max-w-sm w-full bg-surface-container-lowest p-10 rounded-lg auth-card-shadow border border-stone flex flex-col items-center">
<!-- 1. Couple Names -->
<h1 class="font-hero-names text-section-heading text-on-surface text-center mb-1">Bretch & Joyce</h1>
<!-- 2. Subtext -->
<span class="font-label-caps text-label-caps text-warm-grey text-center mb-6 block uppercase tracking-[0.2em]">Dashboard</span>
<!-- 3. Thin horizontal divider -->
<hr class="w-16 border-t border-primary-container mb-6"/>
<!-- 4. Body copy -->
<p class="font-body-sm text-body-sm text-warm-grey text-center mb-8 leading-relaxed">
                Sign in to manage your guest list and invite links.
            </p>
<!-- 5. Form fields -->
<form class="w-full space-y-4" onsubmit="event.preventDefault()">
<div class="space-y-1">
<label class="font-label-caps text-[10px] text-warm-grey uppercase tracking-wider ml-1" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-surface border border-stone rounded-lg font-body-main text-on-surface focus:border-primary transition-all duration-200 text-sm" id="email" placeholder="e.g., organizer@wedding.com" type="email"/>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-[10px] text-warm-grey uppercase tracking-wider" for="password">Password</label>
<a class="text-[10px] font-label-caps text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<input class="w-full px-4 py-3 bg-surface border border-stone rounded-lg font-body-main text-on-surface focus:border-primary transition-all duration-200 text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- 6. Primary Sign In button -->
<button class="w-full h-12 mt-4 bg-primary-container text-on-primary-container font-label-caps text-label-caps font-bold rounded-full btn-active transition-all flex items-center justify-center gap-2 hover:bg-primary hover:text-white" type="submit">
                    Sign In
                </button>
</form>
<!-- 7. OR divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="flex-grow h-px bg-stone"></div>
<span class="font-label-caps text-[10px] text-warm-grey uppercase tracking-widest">OR</span>
<div class="flex-grow h-px bg-stone"></div>
</div>
<!-- 8. Sign in with Google -->
<button class="w-full h-12 bg-white border border-stone text-on-surface font-label-caps text-label-caps rounded-full btn-active transition-all flex items-center justify-center gap-3 hover:bg-surface-container-low">
<svg height="18" viewbox="0 0 18 18" width="18">
<path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"></path>
<path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"></path>
<path d="M3.964 10.706c-.18-.54-.282-1.117-.282-1.706s.102-1.166.282-1.706V4.962H.957C.347 6.177 0 7.548 0 9s.347 2.823.957 4.038l3.007-2.332z" fill="#FBBC05"></path>
<path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962l3.007 2.332c.708-2.127 2.692-3.714 5.036-3.714z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
<!-- 9. Fine print -->
<p class="mt-8 font-body-sm text-[11px] text-warm-grey text-center leading-relaxed max-w-[240px]">
                Access is restricted to authorized accounts only. Unauthorized attempts will be logged.
            </p>
</div>
</main>
<!-- Footer Component from JSON -->
<footer class="w-full py-8 mt-auto border-t border-stone bg-surface dark:bg-surface-dim">
<div class="flex flex-col md:flex-row justify-between items-center px-gutter max-w-container-max-dashboard mx-auto gap-4">
<span class="font-label-caps text-label-caps text-warm-grey">© 2024 Invite-Splitz. All rights reserved.</span>
<div class="flex gap-6">
<a class="font-body-sm text-body-sm text-warm-grey hover:text-primary transition-colors cursor-pointer" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-warm-grey hover:text-primary transition-colors cursor-pointer" href="#">Terms of Service</a>
</div>
</div>
</footer>
<!-- Micro-interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.querySelector('label').classList.replace('text-warm-grey', 'text-primary');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.querySelector('label').classList.replace('text-primary', 'text-warm-grey');
                });
            });
        });
    </script>
</body></html>
