<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - B&amp;J Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&amp;family=Inter:wght@300;400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#e5c500",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#ccc9c4",
                    "surface-container": "#eeeee9",
                    "tertiary-fixed": "#e6e2dd",
                    "primary-container": "#e8c800",
                    "on-primary-fixed": "#211b00",
                    "on-tertiary-container": "#565451",
                    "surface-dim": "#dadad6",
                    "secondary-container": "#baf47a",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e2e3de",
                    "on-secondary-fixed": "#0f2000",
                    "on-primary-container": "#625400",
                    "on-tertiary-fixed": "#1c1c19",
                    "surface-bright": "#fafaf5",
                    "on-primary-fixed-variant": "#534600",
                    "butter": "#F5F2C0",
                    "sage": "#B5CC6E",
                    "secondary": "#3d6a00",
                    "primary-fixed-dim": "#e5c500",
                    "primary-fixed": "#ffe257",
                    "inverse-surface": "#2f312e",
                    "on-error": "#ffffff",
                    "on-background": "#1a1c19",
                    "background": "#fafaf5",
                    "surface-container-high": "#e8e8e4",
                    "on-tertiary-fixed-variant": "#484743",
                    "on-error-container": "#93000a",
                    "on-surface": "#1a1c19",
                    "on-secondary-fixed-variant": "#2d5000",
                    "inverse-on-surface": "#f1f1ec",
                    "stone": "#E2DED8",
                    "secondary-fixed-dim": "#9fd762",
                    "primary": "#6e5e00",
                    "on-secondary-container": "#427000",
                    "surface-container-highest": "#e2e3de",
                    "surface": "#fafaf5",
                    "surface-container-low": "#f4f4ef",
                    "tertiary": "#605e5a",
                    "secondary-fixed": "#baf47a",
                    "warm-grey": "#7A7670",
                    "lemon": "#F0E44A",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#4c4732",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "forest": "#4E8A20",
                    "outline": "#7e7760",
                    "surface-tint": "#6e5e00",
                    "outline-variant": "#cfc6ac",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#c9c6c1"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "section-gap-mobile": "3rem",
                    "container-max-dashboard": "1024px",
                    "gutter": "1.5rem",
                    "container-max-guest": "576px",
                    "section-gap-desktop": "5rem"
            },
            "fontFamily": {
                    "label-caps": ["Inter"],
                    "body-main": ["Inter"],
                    "section-heading": ["Cormorant Garamond"],
                    "hero-names-mobile": ["Cormorant Garamond"],
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "hero-names": ["Cormorant Garamond"]
            },
            "fontSize": {
                    "label-caps": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.15em", "fontWeight": "400"}],
                    "body-main": ["16px", {"lineHeight": "1.6", "fontWeight": "300"}],
                    "section-heading": ["30px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "hero-names-mobile": ["48px", {"lineHeight": "1.1", "fontWeight": "300"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "300"}],
                    "hero-names": ["72px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "300"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FAFAF5; /* Canvas background from style guidance */
        }
        .sign-in-card {
            box-shadow: 0px 4px 20px rgba(44, 43, 40, 0.05); /* Soft ambient shadow from guidance */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-main text-on-surface min-h-screen flex items-center justify-center p-gutter">
<!-- Main Sign-In Card -->
<main class="w-full max-w-sm bg-surface-container-lowest rounded-lg sign-in-card p-8 flex flex-col items-center">
<!-- 1. Couple Names -->
<h1 class="font-hero-names-mobile text-[24px] text-on-surface text-center mb-1">
            Bretch &amp; Joyce
        </h1>
<!-- 2. Subtext -->
<p class="font-label-caps text-[12px] tracking-[0.15em] text-warm-grey text-center mb-6">
            DASHBOARD
        </p>
<!-- 3. Divider -->
<hr class="w-full border-t border-stone mb-6"/>
<!-- 4. Body Copy -->
<p class="font-body-sm text-warm-grey text-center mb-8 px-2">
            Sign in to manage your guest list and invite links.
        </p>
<!-- 5. Google Sign-In Button -->
<form class="w-full flex flex-col gap-6 mb-6">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-[12px] tracking-[0.15em] text-warm-grey uppercase">Email Address</label>
<input class="w-full h-[48px] px-4 text-[16px] border border-stone rounded-lg bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary" placeholder="name@example.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-[12px] tracking-[0.15em] text-warm-grey uppercase">Password</label>
<input class="w-full h-[48px] px-4 text-[16px] border border-stone rounded-lg bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full h-[48px] bg-primary-container text-on-primary-container font-medium rounded-full hover:opacity-90 transition-all duration-200 active:scale-[0.98] shadow-sm" type="submit">
    Sign In
  </button>
</form>
<div class="w-full flex items-center gap-4 mb-6">
<div class="flex-1 border-t border-stone opacity-50"></div>
<span class="font-label-caps text-[10px] tracking-[0.2em] text-warm-grey">OR</span>
<div class="flex-1 border-t border-stone opacity-50"></div>
</div><button class="group w-full h-[48px] flex items-center justify-center gap-3 bg-surface-container-lowest border border-stone rounded-full shadow-sm hover:bg-surface-container-low transition-all duration-200 active:scale-[0.98]">
<!-- Google "G" Icon (Using a themed representation via Material Symbols for consistency) -->
<div class="w-5 h-5 flex items-center justify-center">
<svg height="18" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</div>
<span class="font-body-main text-[16px] text-on-surface font-medium">
                Sign in with Google
            </span>
</button>
<!-- 6. Fine Print -->
<p class="font-body-sm text-[12px] text-warm-grey text-center mt-8">
            Access is restricted to authorized accounts only.
        </p>
</main>
<!-- Visual Accent: Subtle Botanical Detail (as per Style Guidance) -->
<div class="fixed bottom-0 left-0 p-8 hidden md:block opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-[120px] text-secondary">
            spa
        </span>
</div>
<!-- Footer Identity (from Shared Components JSON) -->
<footer class="fixed bottom-6 left-0 w-full flex flex-col items-center gap-2 px-gutter text-center">
<div class="font-body-sm text-[12px] text-warm-grey">
            2024 Bretch &amp; Joyce • invite-splitz
        </div>
</footer>
<script>
        // Micro-interaction for the sign-in button
        const signInBtn = document.querySelector('button');
        signInBtn.addEventListener('click', () => {
            signInBtn.style.opacity = '0.7';
            setTimeout(() => {
                signInBtn.style.opacity = '1';
                console.log('Initiating Google OAuth Flow...');
            }, 150);
        });
    </script>
</body></html>
